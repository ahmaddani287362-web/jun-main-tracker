<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>JUN HUB | Entertainment Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'Inter', system-ui, monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }

        /* Header - Judul */
        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #ffffff;
            margin-bottom: 0.5rem;
            font-family: monospace;
        }

        .header p {
            font-size: 0.9rem;
            color: #888888;
            letter-spacing: 0.5px;
            font-weight: 400;
        }

        /* Grid kotak tracker */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        /* Kotak tracker seperti Minecraft inventory slot */
        .tracker-card {
            background: #1a1a1a;
            border: 2px solid #333333;
            border-radius: 4px;
            padding: 2rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tracker-card:hover {
            border-color: #666666;
            background: #222222;
            transform: translateY(-2px);
        }

        .tracker-card:active {
            transform: translateY(0);
        }

        .tracker-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #cccccc;
            letter-spacing: 1px;
            font-family: monospace;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 1.5rem;
            }

            .header h1 {
                font-size: 2rem;
            }

            .header p {
                font-size: 0.75rem;
            }

            .grid {
                grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
                gap: 1rem;
            }

            .tracker-card {
                padding: 1.5rem 0.8rem;
            }

            .tracker-name {
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            .grid {
                grid-template-columns: 1fr;
                gap: 0.8rem;
            }

            .tracker-card {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header judul di atas -->
        <div class="header">
            <h1>JUN HUB</h1>
            <p>Your Personal Entertainment Tracker</p>
        </div>

        <!-- Grid tracker -->
        <div class="grid" id="trackerGrid">
            <!-- Akan diisi JavaScript -->
        </div>
    </div>

    <script>
        // Data tracker (tanpa icon, tanpa tombol, hanya nama)
        const TRACKERS = [
            { name: "BOOKS", url: "https://books-jun.vercel.app" },
            { name: "CINEMA", url: "https://cinema-jun.ahmaddani287362.workers.dev" },
            { name: "GAMES", url: "https://games-jun.vercel.app" },
            { name: "KOMIK", url: "https://komiku-junn.pages.dev" },
            { name: "UPCOMING", url: "https://upcoming-jun.vercel.app" }
        ];

        const grid = document.getElementById('trackerGrid');
        
        TRACKERS.forEach(tracker => {
            const card = document.createElement('div');
            card.className = 'tracker-card';
            card.onclick = () => window.open(tracker.url, '_blank');
            
            const nameSpan = document.createElement('span');
            nameSpan.className = 'tracker-name';
            nameSpan.textContent = tracker.name;
            
            card.appendChild(nameSpan);
            grid.appendChild(card);
        });
    </script>
</body>
</html>
