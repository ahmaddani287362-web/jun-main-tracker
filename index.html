<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Tracker Hub | JUN</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'Inter', system-ui, sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            padding: 2rem 1.5rem;
            line-height: 1.4;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        /* Header */
        .hero {
            text-align: center;
            margin-bottom: 3rem;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #1d1d1f 0%, #007aff 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .hero p {
            font-size: 1.2rem;
            color: #86868b;
            font-weight: 400;
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.75rem;
            margin-bottom: 2.5rem;
        }

        /* Apple glassmorphism card */
        .card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 1.8rem 1.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
            border: 0.5px solid rgba(255, 255, 255, 0.6);
            transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
            text-align: center;
        }

        .card:hover {
            transform: translateY(-6px);
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.08);
        }

        .card-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
        }

        .card-title {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            letter-spacing: -0.01em;
        }

        .card-desc {
            font-size: 0.9rem;
            color: #86868b;
            margin-bottom: 1.5rem;
        }

        .card-action {
            display: inline-block;
            color: #007aff;
            font-weight: 500;
            font-size: 0.95rem;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            background: rgba(0, 122, 255, 0.08);
            transition: all 0.2s;
        }

        .card:hover .card-action {
            background: rgba(0, 122, 255, 0.15);
        }

        /* Footer tip */
        .tip {
            text-align: center;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 1rem;
            font-size: 0.85rem;
            color: #86868b;
            max-width: 500px;
            margin: 0 auto;
        }

        @media (max-width: 680px) {
            body {
                padding: 1rem;
            }
            .hero h1 {
                font-size: 2.2rem;
            }
            .card-title {
                font-size: 1.4rem;
            }
            .card-icon {
                font-size: 2.8rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>🎯 Tracker Hub</h1>
        <p>Pusat kendali entertainment Anda</p>
    </div>

    <div class="grid" id="trackerGrid">
        <!-- Card akan diisi JavaScript -->
    </div>

    <div class="tip">
        ✨ Klik kartel untuk langsung membuka tracker ✨
    </div>
</div>

<script>
    // Data tracker (tanpa statistik, murni navigasi)
    const TRACKERS = [
        {
            name: "Books",
            icon: "📚",
            desc: "Kelola bacaan buku",
            url: "https://books-jun.vercel.app"
        },
        {
            name: "Cinema",
            icon: "🎬",
            desc: "Kelola film & series",
            url: "https://cinema-jun.ahmaddani287362.workers.dev"
        },
        {
            name: "Games",
            icon: "🎮",
            desc: "Kelola koleksi game",
            url: "https://games-jun.vercel.app"
        },
        {
            name: "Komik",
            icon: "🗿",
            desc: "Kelola manga & manhwa",
            url: "https://komiku-junn.pages.dev"
        },
        {
            name: "Upcoming",
            icon: "⏰",
            desc: "Pantau rilis mendatang",
            url: "https://upcoming-jun.vercel.app"
        }
    ];

    const grid = document.getElementById('trackerGrid');
    
    TRACKERS.forEach(tracker => {
        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => window.open(tracker.url, '_blank');
        
        card.innerHTML = `
            <div class="card-icon">${tracker.icon}</div>
            <div class="card-title">${tracker.name}</div>
            <div class="card-desc">${tracker.desc}</div>
            <span class="card-action">Buka →</span>
        `;
        
        grid.appendChild(card);
    });
</script>
</body>
</html>
