<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Tracker Hub JUN | Premium Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Light mode (default) */
            --bg-primary: #f5f5f7;
            --bg-secondary: #ffffff;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --card-bg: rgba(255, 255, 255, 0.75);
            --card-bg-hover: rgba(255, 255, 255, 0.92);
            --card-border: rgba(255, 255, 255, 0.6);
            --accent: #007aff;
            --accent-light: rgba(0, 122, 255, 0.12);
            --accent-hover: rgba(0, 122, 255, 0.15);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
            --shadow-hover: 0 24px 48px rgba(0, 0, 0, 0.08);
            --tip-bg: rgba(255, 255, 255, 0.5);
            --gradient: linear-gradient(135deg, #1d1d1f 0%, #007aff 100%);
        }

        /* Dark mode */
        body.dark {
            --bg-primary: #000000;
            --bg-secondary: #1c1c1e;
            --text-primary: #ffffff;
            --text-secondary: #8e8e93;
            --card-bg: rgba(28, 28, 30, 0.8);
            --card-bg-hover: rgba(28, 28, 30, 0.95);
            --card-border: rgba(255, 255, 255, 0.1);
            --accent: #0a84ff;
            --accent-light: rgba(10, 132, 255, 0.15);
            --accent-hover: rgba(10, 132, 255, 0.2);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            --shadow-hover: 0 24px 48px rgba(0, 0, 0, 0.3);
            --tip-bg: rgba(28, 28, 30, 0.6);
            --gradient: linear-gradient(135deg, #ffffff 0%, #0a84ff 100%);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'Inter', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 2rem 1.5rem;
            line-height: 1.4;
            transition: background 0.3s ease, color 0.3s ease;
            min-height: 100vh;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        /* Header dengan dark mode toggle */
        .hero {
            text-align: center;
            margin-bottom: 3rem;
            position: relative;
        }

        .theme-toggle {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 0.5px solid var(--card-border);
            border-radius: 40px;
            padding: 0.6rem 1rem;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            z-index: 1000;
            box-shadow: var(--shadow);
        }

        .theme-toggle:hover {
            transform: scale(1.05);
            background: var(--card-bg-hover);
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: var(--gradient);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        /* Grid premium */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.75rem;
            margin-bottom: 2.5rem;
        }

        /* Apple glassmorphism card */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 1.8rem 1.5rem;
            box-shadow: var(--shadow);
            border: 0.5px solid var(--card-border);
            transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
            text-align: center;
        }

        .card:hover {
            transform: translateY(-6px);
            background: var(--card-bg-hover);
            box-shadow: var(--shadow-hover);
        }

        /* Efek glow saat hover (premium) */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 28px;
            background: radial-gradient(circle at 50% 0%, var(--accent), transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .card:hover::before {
            opacity: 0.08;
        }

        .card {
            position: relative;
            overflow: hidden;
        }

        .card-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .card:hover .card-icon {
            transform: scale(1.1);
        }

        .card-title {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            letter-spacing: -0.01em;
        }

        .card-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
        }

        .card-action {
            display: inline-block;
            color: var(--accent);
            font-weight: 500;
            font-size: 0.95rem;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            background: var(--accent-light);
            transition: all 0.2s;
        }

        .card:hover .card-action {
            background: var(--accent-hover);
            transform: translateX(4px);
        }

        /* Footer tip premium */
        .tip {
            text-align: center;
            background: var(--tip-bg);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 1rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            max-width: 500px;
            margin: 0 auto;
            border: 0.5px solid var(--card-border);
        }

        /* Animasi fade in untuk card */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            animation: fadeInUp 0.6s ease forwards;
            opacity: 0;
        }

        .card:nth-child(1) { animation-delay: 0.05s; }
        .card:nth-child(2) { animation-delay: 0.1s; }
        .card:nth-child(3) { animation-delay: 0.15s; }
        .card:nth-child(4) { animation-delay: 0.2s; }
        .card:nth-child(5) { animation-delay: 0.25s; }

        /* Responsive mobile */
        @media (max-width: 680px) {
            body {
                padding: 1rem;
            }
            
            .theme-toggle {
                top: 1rem;
                right: 1rem;
                padding: 0.5rem 0.8rem;
                font-size: 1rem;
            }
            
            .hero h1 {
                font-size: 2.2rem;
            }
            
            .hero p {
                font-size: 1rem;
            }
            
            .card-title {
                font-size: 1.4rem;
            }
            
            .card-icon {
                font-size: 2.8rem;
            }
            
            .grid {
                gap: 1.2rem;
            }
            
            .card {
                padding: 1.5rem 1.2rem;
            }
        }

        /* Untuk layar sangat kecil */
        @media (max-width: 480px) {
            .hero h1 {
                font-size: 1.8rem;
            }
            
            .grid {
                grid-template-columns: 1fr;
            }
        }

        /* Scrollbar premium (webkit) */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--text-secondary);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }
    </style>
</head>
<body>
    <div class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
        🌙
    </div>

    <div class="container">
        <div class="hero">
            <h1>🎯 Tracker Hub JUN</h1>
            <p>Pusat kendali entertainment JUN</p>
        </div>

        <div class="grid" id="trackerGrid">
            <!-- Card akan diisi JavaScript -->
        </div>

        <div class="tip">
            ✨ Klik kartel untuk langsung membuka tracker premium ✨
        </div>
    </div>

    <script>
        // Data tracker (murni navigasi)
        const TRACKERS = [
            {
                name: "Books",
                icon: "📚",
                desc: "Kelola bacaan buku",
                url: "https://books-jun.vercel.app"
            },
            {
                name: "Cinema",
                icon: "🎬",
                desc: "Kelola film & series",
                url: "https://cinema-jun.ahmaddani287362.workers.dev"
            },
            {
                name: "Games",
                icon: "🎮",
                desc: "Kelola koleksi game",
                url: "https://games-jun.vercel.app"
            },
            {
                name: "Komik",
                icon: "🗿",
                desc: "Kelola manga & manhwa",
                url: "https://komiku-junn.pages.dev"
            },
            {
                name: "Upcoming",
                icon: "⏰",
                desc: "Pantau rilis mendatang",
                url: "https://upcoming-jun.vercel.app"
            }
        ];

        // Dark mode management
        function initDarkMode() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                document.body.classList.add('dark');
                updateToggleIcon(true);
            } else {
                document.body.classList.remove('dark');
                updateToggleIcon(false);
            }
        }

        function updateToggleIcon(isDark) {
            const toggle = document.getElementById('themeToggle');
            if (toggle) {
                toggle.textContent = isDark ? '☀️' : '🌙';
            }
        }

        function toggleDarkMode() {
            const isDark = document.body.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateToggleIcon(isDark);
        }

        // Render cards
        function renderCards() {
            const grid = document.getElementById('trackerGrid');
            if (!grid) return;
            
            grid.innerHTML = '';
            
            TRACKERS.forEach(tracker => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => window.open(tracker.url, '_blank');
                
                card.innerHTML = `
                    <div class="card-icon">${tracker.icon}</div>
                    <div class="card-title">${tracker.name}</div>
                    <div class="card-desc">${tracker.desc}</div>
                    <span class="card-action">Buka →</span>
                `;
                
                grid.appendChild(card);
            });
        }

        // Event listener
        document.getElementById('themeToggle')?.addEventListener('click', toggleDarkMode);
        
        // Initialize
        initDarkMode();
        renderCards();
        
        // Optional: Watch for system theme changes
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
            if (!localStorage.getItem('theme')) {
                if (e.matches) {
                    document.body.classList.add('dark');
                    updateToggleIcon(true);
                } else {
                    document.body.classList.remove('dark');
                    updateToggleIcon(false);
                }
            }
        });
    </script>
</body>
</html>
